name: Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Release (otherwise artifacts only)'
        type: boolean
        default: false

permissions:
  contents: write   # required to create GitHub releases

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build macOS (universal)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --universal --publish never

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(ls dist/temp/*.dmg | head -1)
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Publish macOS to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish == true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DMG=$(ls dist/temp/*.dmg | head -1)
          ZIP=$(ls dist/temp/*.zip | head -1)
          YML="dist/temp/latest-mac.yml"
          gh release create "$TAG" --title "$TAG" --notes "" 2>/dev/null || true
          gh release upload "$TAG" "$DMG" "${DMG}.blockmap" "$ZIP" "${ZIP}.blockmap" "$YML" --clobber

      - name: Upload macOS artifacts (dispatch runs)
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/temp/*.dmg
            dist/temp/*.zip
            dist/temp/latest-mac.yml

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain-db || true

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Build Windows x64
        run: npx electron-builder --win --x64 --publish never

      - name: Build Windows arm64
        run: npx electron-builder --win --arm64 --publish never

      - name: Publish Windows to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish == true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" --title "$TAG" --notes "" 2>/dev/null || true
          gh release upload "$TAG" \
            dist/temp/Transcribely-*-Setup-x64.exe \
            dist/temp/Transcribely-*-Setup-x64.exe.blockmap \
            dist/temp/Transcribely-*-Setup-arm64.exe \
            dist/temp/Transcribely-*-Setup-arm64.exe.blockmap \
            dist/temp/latest.yml \
            --clobber

      - name: Upload Windows artifacts (dispatch runs)
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/temp/Transcribely-*-Setup-*.exe
            dist/temp/latest.yml
