name: Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build Windows x64
        run: npx electron-builder --win --x64 --publish never

      - name: Build Windows arm64
        run: npx electron-builder --win --arm64 --publish never

      - name: Upload to S3
        shell: bash
        run: |
          aws s3 cp dist/temp/Transcribely-*-Setup-x64.exe s3://transcribely-releases/releases/
          aws s3 cp dist/temp/Transcribely-*-Setup-arm64.exe s3://transcribely-releases/releases/
          aws s3 cp dist/temp/latest.yml s3://transcribely-releases/releases/latest.yml
